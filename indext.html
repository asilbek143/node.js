<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASILBEK STORE - Telegram orqali buyurtma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e2b3c, #2c4e6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .cart-icon {
            background: #1f6392;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #1e2b3c, #2c4e6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p {
            color: #4a627a;
            margin-top: 0.5rem;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .product-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .product-card:hover {
            transform: translateY(-8px);
        }
        .card-img {
            background: #f0f4fa;
            display: flex;
            justify-content: center;
            padding: 2rem;
            min-height: 180px;
        }
        .card-img img {
            max-height: 120px;
            object-fit: contain;
        }
        .card-info {
            padding: 1.5rem;
        }
        .product-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f2e3a;
        }
        .product-category {
            font-size: 0.75rem;
            background: #eef2fa;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            display: inline-block;
            margin: 0.5rem 0;
        }
        .price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1f6392;
        }
        .old-price {
            text-decoration: line-through;
            color: #94a9c2;
            font-size: 0.9rem;
            margin-left: 0.5rem;
        }
        .buy-btn {
            width: 100%;
            margin-top: 1rem;
            background: #1f6392;
            border: none;
            padding: 12px 0;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .buy-btn:hover {
            background: #0f4a6e;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
        }
        .close-modal {
            position: absolute;
            right: 1.5rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }
        .order-form {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
        }
        .order-form input, .order-form textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 16px;
        }
        .order-form button {
            background: #1f6392;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 40px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .alert {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            color: #6c86a0;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .navbar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">✨ ASILBEK STORE</div>
        <button class="cart-icon" onclick="openCart()">🛒 Savat (<span id="cartCount">0</span>)</button>
    </div>

    <div class="header">
        <h1>✨ Eng sara mahsulotlar</h1>
        <p>Sifat va qulay narxlar | Telegram orqali buyurtma</p>
    </div>

    <div id="alertBox" class="alert alert-success"></div>

    <div class="products-grid" id="productsGrid"></div>

    <div class="footer">
        ⚡ Buyurtmalar Telegram bot orqali keladi | @ASILBEKMC
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeCart()">&times;</span>
        <h2>🛒 Savatim</h2>
        <div id="cartItems"></div>
        <div id="cartTotal" style="font-weight: bold; margin-top: 1rem;"></div>
        
        <div class="order-form">
            <h3>📋 Buyurtma ma'lumotlari</h3>
            <input type="text" id="fullname" placeholder="To'liq ismingiz *" required>
            <input type="tel" id="phone" placeholder="Telefon raqam *" required>
            <textarea id="address" rows="2" placeholder="Yetkazib berish manzili *" required></textarea>
            <textarea id="note" rows="2" placeholder="Izoh (ixtiyoriy)"></textarea>
            <button onclick="sendToTelegram()">📨 Telegram orqali yuborish</button>
        </div>
    </div>
</div>

<script>
    // ========== TELEGRAM SOZLAMALARI ==========
    const BOT_TOKEN = "8247487028:AAF2mCi3oY78mPiUwET8TkmQnkOOiMezZv8";
    // Sizning shaxsiy chat ID ingizni topish uchun: @userinfobot ga yozing
    // Yoki quyidagi qatorni o'zgartiring:
    const CHAT_ID = "ASILBEKMC";  // Sizning Telegram @username yoki raqamli ID
    
    const products = [
        { id: 1, name: "Galaxy Z-Fold", category: "📱 Elektronika", desc: "7.6 dyuymli dinamik AMOLED, 512GB xotira, suvga chidamli", price: 999, oldPrice: 1299, image: "https://cdn-icons-png.flaticon.com/512/2920/2920244.png" },
        { id: 2, name: "AirBook Pro M3", category: "💻 Noutbuklar", desc: "16GB RAM, 512GB SSD, 14 dyuym Retina, batareya 18 soat", price: 1499, oldPrice: 1799, image: "https://cdn-icons-png.flaticon.com/512/1549/1549447.png" },
        { id: 3, name: "Watch Ultra 2", category: "⌚ Aqlli soatlar", desc: "SpO2, EKG, GPS, 49 mm titanium korpus", price: 499, oldPrice: 649, image: "https://cdn-icons-png.flaticon.com/512/1040/1040817.png" },
        { id: 4, name: "SoundBuds Pro", category: "🎧 Audio", desc: "Aktiv shovqin o'chirish, 30 soat batareya, IPX4", price: 129, oldPrice: 199, image: "https://cdn-icons-png.flaticon.com/512/1055/1055687.png" },
        { id: 5, name: "RGB Ultimate Mouse", category: "🎮 Gaming", desc: "26000 DPI, simsiz, RGB yoritish, 80 soat", price: 79, oldPrice: 129, image: "https://cdn-icons-png.flaticon.com/512/3163/3163483.png" },
        { id: 6, name: "Alpha Mirrorless Z7", category: "📸 Kameralar", desc: "45.7 MP, 4K video, 10 kadr/s", price: 1999, oldPrice: 2499, image: "https://cdn-icons-png.flaticon.com/512/1360/1360811.png" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || {};

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const count = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cartCount').innerText = count;
    }

    function addToCart(productId) {
        if(cart[productId]) {
            cart[productId].quantity++;
        } else {
            const product = products.find(p => p.id == productId);
            cart[productId] = {
                name: product.name,
                price: product.price,
                quantity: 1
            };
        }
        saveCart();
        showAlert(`${products.find(p => p.id == productId).name} savatga qo'shildi!`, 'success');
    }

    function showAlert(msg, type) {
        const alertBox = document.getElementById('alertBox');
        alertBox.className = `alert alert-${type}`;
        alertBox.innerText = msg;
        alertBox.style.display = 'block';
        setTimeout(() => {
            alertBox.style.display = 'none';
        }, 2000);
    }

    function openCart() {
        renderCartModal();
        document.getElementById('cartModal').style.display = 'flex';
    }

    function closeCart() {
        document.getElementById('cartModal').style.display = 'none';
    }

    function renderCartModal() {
        const cartItemsDiv = document.getElementById('cartItems');
        const cartTotalDiv = document.getElementById('cartTotal');
        
        if(Object.keys(cart).length === 0) {
            cartItemsDiv.innerHTML = '<p style="text-align:center; padding:2rem;">Savat bo\'sh</p>';
            cartTotalDiv.innerHTML = '';
            return;
        }
        
        let html = '';
        let total = 0;
        for(let id in cart) {
            const item = cart[id];
            const subtotal = item.price * item.quantity;
            total += subtotal;
            html += `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        $${item.price} x ${item.quantity}
                    </div>
                    <div>
                        <strong>$${subtotal}</strong>
                        <button onclick="removeFromCart(${id})" style="margin-left:10px; background:red; color:white; border:none; border-radius:20px; padding:5px 10px; cursor:pointer;">🗑</button>
                    </div>
                </div>
            `;
        }
        cartItemsDiv.innerHTML = html;
        cartTotalDiv.innerHTML = `<strong>Jami: $${total}</strong>`;
    }

    function removeFromCart(productId) {
        delete cart[productId];
        saveCart();
        renderCartModal();
    }

    async function sendToTelegram() {
        const fullname = document.getElementById('fullname').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const note = document.getElementById('note').value.trim();
        
        if(!fullname || !phone || !address) {
            showAlert("Iltimos, barcha majburiy maydonlarni to'ldiring!", 'error');
            return;
        }
        
        if(Object.keys(cart).length === 0) {
            showAlert("Savat bo'sh! Iltimos mahsulot tanlang.", 'error');
            return;
        }
        
        let itemsList = '';
        let total = 0;
        for(let id in cart) {
            const item = cart[id];
            const subtotal = item.price * item.quantity;
            total += subtotal;
            itemsList += `• ${item.name} x ${item.quantity} = $${subtotal}\n`;
        }
        
        const orderText = `🛍️ <b>YANGI BUYURTMA!</b>
        
👤 <b>Mijoz:</b> ${fullname}
📞 <b>Telefon:</b> ${phone}
📍 <b>Manzil:</b> ${address}
📝 <b>Izoh:</b> ${note || '-'}

<b>📦 Mahsulotlar:</b>
${itemsList}
💰 <b>Jami:</b> $${total}

🕐 Vaqt: ${new Date().toLocaleString('uz-UZ')}`;
        
        // Telegram bot orqali yuborish
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: orderText,
                    parse_mode: 'HTML'
                })
            });
            
            const result = await response.json();
            
            if(result.ok) {
                // Savatni tozalash
                cart = {};
                saveCart();
                closeCart();
                
                // Formalarni tozalash
                document.getElementById('fullname').value = '';
                document.getElementById('phone').value = '';
                document.getElementById('address').value = '';
                document.getElementById('note').value = '';
                
                showAlert("✅ Buyurtma muvaffaqiyatli yuborildi! Tez orada siz bilan bog'lanamiz.", 'success');
            } else {
                showAlert("❌ Xatolik yuz berdi. Iltimos qaytadan urinib ko'ring.", 'error');
            }
        } catch(error) {
            showAlert("❌ Internet bilan bog'liq muammo!", 'error');
        }
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="card-img">
                    <img src="${p.image}" alt="${p.name}">
                </div>
                <div class="card-info">
                    <span class="product-category">${p.category}</span>
                    <h3 class="product-title">${p.name}</h3>
                    <p>${p.desc}</p>
                    <div class="price">
                        $${p.price}
                        ${p.oldPrice ? `<span class="old-price">$${p.oldPrice}</span>` : ''}
                    </div>
                    <button class="buy-btn" onclick="addToCart(${p.id})">🛒 Savatga qo'shish</button>
                </div>
            </div>
        `).join('');
    }

    renderProducts();
    updateCartDisplay();
    
    window.onclick = function(event) {
        const modal = document.getElementById('cartModal');
        if(event.target === modal) {
            closeCart();
        }
    }
</script>
</body>
  </html>
